<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>网页围棋 · KataGo</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<!-- User bar -->
<div id="user-bar">
  <div id="user-logged-out">
    <button id="btn-show-login" class="btn btn-small">登录</button>
    <button id="btn-show-register" class="btn btn-small btn-primary">注册</button>
  </div>
  <div id="user-logged-in" class="hidden">
    <span id="user-display-name"></span>
    <span id="user-stats"></span>
    <button id="btn-logout" class="btn btn-small btn-outline">退出</button>
  </div>
</div>

<!-- Auth modal -->
<div id="auth-modal" class="modal hidden">
  <div class="modal-content">
    <button id="auth-close" class="modal-close">&times;</button>
    <h2 id="auth-title">登录</h2>
    <form id="auth-form" autocomplete="off">
      <label>用户名
        <input id="auth-username" type="text" maxlength="20" required />
      </label>
      <label>密码
        <input id="auth-password" type="password" minlength="4" required />
      </label>
      <div id="auth-display-row" class="hidden">
        <label>显示名称（可选）
          <input id="auth-display-name" type="text" maxlength="20" />
        </label>
      </div>
      <p id="auth-error" class="auth-error hidden"></p>
      <button type="submit" class="btn btn-primary" id="auth-submit">登录</button>
    </form>
    <div id="google-divider" class="auth-divider hidden">
      <span>或</span>
    </div>
    <div id="google-signin-btn" class="hidden"></div>
    <p class="auth-switch">
      <span id="auth-switch-text">没有账号？</span>
      <button id="auth-switch-btn" class="link-btn">注册</button>
    </p>
  </div>
</div>

<div id="app">
  <!-- Left: board -->
  <div id="board-panel">
    <canvas id="goboard"></canvas>
    <div id="thinking-indicator" class="hidden">AI 思考中…</div>
  </div>

  <!-- Right: controls -->
  <div id="side-panel">
    <h1>网页围棋</h1>
    <p class="subtitle">引擎：KataGo Eigen (CPU)</p>
    <p class="subtitle"><a href="/chess" style="color:#e4c97e;text-decoration:none;">→ 中国象棋</a></p>

    <!-- New game settings -->
    <section id="setup-section">
      <h2>新对局</h2>

      <label>棋盘大小
        <select id="board-size">
          <option value="19" selected>19×19</option>
          <option value="13">13×13</option>
          <option value="9">9×9</option>
        </select>
      </label>

      <label>我执
        <select id="human-color">
          <option value="black" selected>黑棋（先手）</option>
          <option value="white">白棋（后手）</option>
        </select>
      </label>

      <label>对弈模式
        <select id="game-mode">
          <option value="vs_ai" selected>人机对弈（AI）</option>
          <option value="vs_human">双人对弈（本地）</option>
        </select>
      </label>

      <div id="difficulty-group">
        <label>AI 难度
          <select id="difficulty">
            <option value="beginner">入门 — 最弱最快</option>
            <option value="easy" selected>初级 — 弱（推荐）</option>
            <option value="medium">中级 — 较强</option>
            <option value="hard">高手 — 最强</option>
          </select>
        </label>
      </div>

      <label>贴目 (komi)
        <input id="komi" type="number" value="7.5" step="0.5" min="0" max="15" />
      </label>

      <button id="btn-new-game" class="btn btn-primary">开始对局</button>
      <button id="btn-go-replay" class="btn btn-outline" style="margin-top:6px">经典复盘</button>
      <button id="btn-go-my-games" class="btn btn-outline hidden" style="margin-top:6px">我的棋局</button>
    </section>

    <!-- My games history -->
    <section id="my-games-section" class="hidden">
      <div class="replay-header">
        <button id="btn-my-games-back" class="back-btn">← 返回</button>
        <h2>我的棋局</h2>
      </div>
      <div id="my-game-list"><p class="replay-loading">加载中…</p></div>
    </section>

    <!-- Classic replay -->
    <section id="replay-section" class="hidden">
      <div class="replay-header">
        <button id="btn-replay-back" class="back-btn">← 返回</button>
        <h2>经典复盘</h2>
      </div>

      <!-- Game picker -->
      <div id="replay-picker">
        <div id="game-list"><p class="replay-loading">加载中…</p></div>
      </div>

      <!-- Replay controls (shown after a game is selected) -->
      <div id="replay-controls" class="hidden">
        <div class="replay-players">
          <span id="replay-black">⚫ 黑方</span>
          <span class="replay-vs">vs</span>
          <span id="replay-white">⚪ 白方</span>
        </div>
        <div id="replay-meta" class="replay-meta"></div>

        <div class="replay-progress">
          <span id="replay-move-num">开局</span>
          <span id="replay-total"></span>
        </div>

        <div id="replay-comment" class="replay-comment hidden"></div>

        <div class="replay-nav">
          <button class="nav-btn" id="btn-r-first" title="第一手">⏮</button>
          <button class="nav-btn" id="btn-r-prev"  title="上一手">◀</button>
          <button class="nav-btn" id="btn-r-next"  title="下一手">▶</button>
          <button class="nav-btn" id="btn-r-last"  title="最后一手">⏭</button>
        </div>
        <button class="btn btn-secondary" id="btn-autoplay" style="margin-top:6px;font-size:13px">▶ 自动播放</button>
        <input type="range" id="replay-slider" min="0" value="0" style="width:100%;margin-top:8px">

        <button id="btn-pick-another" class="btn btn-outline" style="margin-top:8px;font-size:12px">← 选择其他棋局</button>
      </div>
    </section>

    <!-- In-game controls -->
    <section id="game-section" class="hidden">
      <h2>对局中</h2>

      <div class="info-row">
        <span class="label" id="label-mode">我执：</span>
        <span id="info-human-color" class="value">—</span>
      </div>
      <div class="info-row">
        <span class="label">当前手：</span>
        <span id="info-turn" class="value">—</span>
      </div>
      <div class="info-row">
        <span class="label">提子（黑）：</span>
        <span id="info-cap-black" class="value">0</span>
      </div>
      <div class="info-row">
        <span class="label">提子（白）：</span>
        <span id="info-cap-white" class="value">0</span>
      </div>
      <div class="info-row">
        <span class="label">手数：</span>
        <span id="info-moves" class="value">0</span>
      </div>

      <div class="btn-group">
        <button id="btn-pass" class="btn btn-secondary">虚手 (Pass)</button>
        <button id="btn-undo" class="btn btn-secondary">悔棋</button>
        <button id="btn-resign" class="btn btn-danger">认输 (Resign)</button>
      </div>

      <button id="btn-end-game" class="btn btn-outline">数棋结束</button>
    </section>

    <!-- Result -->
    <section id="result-section" class="hidden">
      <h2>对局结果</h2>
      <p id="result-text" class="result-text">—</p>
      <div id="result-detail" class="result-detail"></div>
      <button id="btn-again" class="btn btn-primary">再来一局</button>
    </section>

    <!-- Move log -->
    <section id="log-section">
      <h2>棋谱</h2>
      <div id="move-log"></div>
    </section>
  </div>
</div>

<div id="toast"></div>

<script src="game.js"></script>
</body>
</html>
