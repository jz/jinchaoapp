# KataGo GTP Config - optimized for 1GB RAM VPS

# === Search ===
numSearchThreads = 1
maxVisits = 200
maxTime = 15.0

# === Neural Network ===
nnMaxBatchSize = 1
# Cache size in entries (2^15 = 32K). Each entry ~1.5KB, so ~48MB.
# Reduced from 17 to 15 to accommodate larger b18c384nbt model weights (~107MB).
nnCacheSizePowerOfTwo = 15
nnMutexPoolSizePowerOfTwo = 14
nnRandomize = true

# === GPU / Backend ===
# Eigen is CPU-only, no GPU config needed

# === Logging ===
logSearchInfo = false
logToStderr = true

# === Rules ===
# Default: Chinese rules, komi 7.5 (set per-game via GTP)
koRule = POSITIONAL
scoringRule = AREA
taxRule = NONE
multiStoneSuicideLegal = false
hasButton = false
