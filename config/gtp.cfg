# KataGo GTP Config - optimized for 1GB RAM VPS

# === Search ===
numSearchThreads = 1
maxVisits = 200
maxTime = 15.0

# === Neural Network ===
nnMaxBatchSize = 1
# Cache size in entries (2^17 = 128K). Each entry ~1.5KB, so ~192MB max.
# Lower this if you run out of memory.
nnCacheSizePowerOfTwo = 17
nnMutexPoolSizePowerOfTwo = 14
nnRandomize = true

# === GPU / Backend ===
# Eigen is CPU-only, no GPU config needed

# === Logging ===
logSearchInfo = false
logToStderr = true

# === Rules ===
# Default: Chinese rules, komi 7.5 (set per-game via GTP)
koRule = POSITIONAL
scoringRule = AREA
taxRule = NONE
multiStoneSuicideLegal = false
hasButton = false
